services:
  postgres:
    image: postgres:17.4
    container_name: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password'
    ports:
      - 5432:5432

volumes:
  postgresql_data:
    driver: local

networks:
  postgres_network:
    driver: bridge
